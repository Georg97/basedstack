# Local Postgres for development. `docker compose up -d` and you have a database.
# The same image runs fine on a single VPS or home server for self-hosting.
# Values come from .env (with the defaults below), so keep DATABASE_URL in sync.
services:
  db:
    image: postgres:${POSTGRES_VERSION:-17}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-basedstack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-basedstack}
      POSTGRES_DB: ${POSTGRES_DB:-basedstack}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-basedstack} -d ${POSTGRES_DB:-basedstack}']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
